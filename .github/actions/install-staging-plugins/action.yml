name: Install staging plugins
description: Install staging plugins from elementor-tests-configuration repo

inputs:
  app-id:
    description: GitHub App ID for elementor-tests-configuration access
    required: true
  private-key:
    description: GitHub App private key for elementor-tests-configuration access
    required: true
  owner:
    description: Repository owner for elementor-tests-configuration
    required: false
    default: elementor
  repository:
    description: Repository name for test configuration
    required: false
    default: elementor-tests-configuration
  ref:
    description: Git ref to checkout from test configuration repo
    required: false
    default: add-plugins-for-stg-run
  path:
    description: Local path to checkout the repo to
    required: false
    default: elementor-tests-configuration
  plugins-dir:
    description: Local plugins directory to install into
    required: false
    default: tests/wp-env/plugins

runs:
  using: composite
  steps:
    - name: Generate token for tests configuration repo
      id: generate-tests-configuration-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}

    - name: Checkout tests configuration repo (staging plugins)
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.owner }}/${{ inputs.repository }}
        token: ${{ steps.generate-tests-configuration-token.outputs.token }}
        path: ${{ inputs.path }}
        persist-credentials: false
        ref: ${{ inputs.ref }}

    - name: Install staging plugins from tests configuration repo
      shell: bash
      run: |
        set -euo pipefail

        PLUGINS_DIR="${{ inputs.plugins-dir }}"
        REPO_DIR="${{ inputs.path }}"

        mkdir -p "$PLUGINS_DIR"

        install_plugin_zip() {
          local zip_path="$1"
          local slug="$2"

          if [ ! -f "$zip_path" ]; then
            echo "Missing plugin zip: $zip_path"
            exit 1
          fi

          local first_entry
          first_entry="$(unzip -Z1 "$zip_path" | awk 'substr($0, 1, 9) != "__MACOSX/" { print; exit }')"

          if [ -z "$first_entry" ]; then
            echo "Empty plugin zip: $zip_path"
            exit 1
          fi

          local top_folder
          top_folder="$(printf '%s' "$first_entry" | cut -d/ -f1)"

          rm -rf "$PLUGINS_DIR/$slug"
          unzip -q -o "$zip_path" -d "$PLUGINS_DIR"

          if [ "$top_folder" != "$slug" ] && [ -d "$PLUGINS_DIR/$top_folder" ]; then
            mv "$PLUGINS_DIR/$top_folder" "$PLUGINS_DIR/$slug"
          fi

          if [ ! -d "$PLUGINS_DIR/$slug" ]; then
            mkdir -p "$PLUGINS_DIR/$slug"
            unzip -q -o "$zip_path" -d "$PLUGINS_DIR/$slug"
          fi

          echo "Installed $slug from $zip_path"
        }

        install_plugin_zip "$REPO_DIR/stg-runner.zip" "stg-runner"
        install_plugin_zip "$REPO_DIR/elementor-dev-tools-master.zip" "elementor-dev-tools-master"
