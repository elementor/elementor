name: Playwright

on:
  merge_group:
  schedule:
    - cron: '30 08 * * 0,1,2,3,4,5'
  workflow_dispatch:
    inputs:
      fail_fast:
        type: boolean
        required: true
        description: 'Cancel tests when one of them fails'
        default: false
      tag:
        description: 'Provide @tag or a keyword'
        required: false
      repeat_each:
        description: 'Number of repetitions (for tagged tests only)'
        required: false
        type: number
      run_mode:
        type: choice
        description: 'Run mode'
        required: true
        default: 'standard'
        options:
          - standard
          - nightly
      browser:
        type: choice
        description: 'Browser to run tests on'
        required: true
        default: 'chromium'
        options:
          - chromium
          - firefox
          - webkit
      environment:
        type: choice
        description: 'Target environment'
        required: true
        default: 'production'
        options:
          - production
          - staging

concurrency:
  group: playwright-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  set-pending-on-draft:
    name: Set Pending Status on Draft
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - name: Lock Merge with Pending Status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'Playwright - Test Results',
              description: 'Waiting for PR to be marked as Ready for Review to run tests'
            })

  get-php-version:
    name: Calculate PHP Version
    uses: ./.github/workflows/calculate_php_version.yml

  build-plugin:
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    name: Playwright build artifact
    uses: ./.github/workflows/build.yml
    with:
      job_name: Playwright build artifact

  run-playwright-suite:
    name: Playwright Suite
    needs: [build-plugin, get-php-version]
    if: |
      (github.event.inputs.tag == '' || github.event.inputs.tag == null) &&
      needs.build-plugin.result == 'success'
    uses: ./.github/workflows/playwright-suite.yml
    with:
      build_artifact_name: ${{ needs.build-plugin.outputs.artifact_name }}

  PlaywrightWithTag:
    name: Playwright test - tagged tests on PHP (${{ needs.get-php-version.outputs.php_version }})
    runs-on: ubuntu-22.04
    needs: [build-plugin, get-php-version]
    permissions:
      contents: read
      id-token: write
    if: ${{ github.event.inputs.tag }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set PHP_VERSION environment variable
        run: echo "PHP_VERSION=${{ needs.get-php-version.outputs.php_version }}" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm run install:ci
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-plugin.outputs.artifact_name }}
          path: ./build
      - name: Download hello-elementor theme
        run: |
          curl -L --output hello-elementor.zip "https://downloads.wordpress.org/theme/hello-elementor.zip"
          unzip hello-elementor

      - name: Install staging plugins
        if: ${{ github.event.inputs.environment == 'staging' }}
        uses: ./.github/actions/install-staging-plugins
        with:
          app-id: ${{ secrets.TEST_CONFIGURATION_APP_ID }}
          private-key: ${{ secrets.TEST_CONFIGURATION_APP_PRIVATE_KEY }}

      - name: Add staging plugins to config
        if: ${{ github.event.inputs.environment == 'staging' }}
        run: |
          jq '.plugins["elementor-dev-tools-master"] = "./tests/wp-env/plugins/elementor-dev-tools-master" | .plugins["stg-runner"] = "./tests/wp-env/plugins/stg-runner"' tests/playwright/.playwright-wp-lite-env.json > tmp.json && mv tmp.json tests/playwright/.playwright-wp-lite-env.json

      - name: Update PHP version in config
        run: |
          jq --arg php_version "${{ env.PHP_VERSION }}" '.phpVersion = $php_version' tests/playwright/.playwright-wp-lite-env.json > tmp.json && mv tmp.json tests/playwright/.playwright-wp-lite-env.json
          echo "PHP version set to:"
          cat tests/playwright/.playwright-wp-lite-env.json | grep phpVersion

      - name: Install WordPress environment
        run: |
          npm run start-local-server
      - name: Setup test data
        run: npm run test:setup:playwright
      - name: Activate staging environment
        if: ${{ github.event.inputs.environment == 'staging' }}
        run: |
          for port in 8888 8889; do
            npx wp-lite-env cli --config=./tests/playwright/.playwright-wp-lite-env.json --port="$port" --command="wp plugin activate elementor-dev-tools-master"
            npx wp-lite-env cli --config=./tests/playwright/.playwright-wp-lite-env.json --port="$port" --command="wp plugin activate stg-runner"
            npx wp-lite-env cli --config=./tests/playwright/.playwright-wp-lite-env.json --port="$port" --command="wp option update elementor-dev-tools-env stg.elementor.red"
          done
      - name: WordPress debug information
        run: |
          npx wp-lite-env cli --config=./tests/playwright/.playwright-wp-lite-env.json --port=8888 --command="wp core version"
          npx wp-lite-env cli --config=./tests/playwright/.playwright-wp-lite-env.json --port=8888 --command="wp --info"
      - name: Resolve browser configuration
        env:
          FULL_BROWSER_COMPAT_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'full-browser-compatibility') }}
          BROWSER_INPUT: ${{ github.event.inputs.browser || 'chromium' }}
        run: |
          if [ "$FULL_BROWSER_COMPAT_LABEL" = "true" ]; then
            echo "FULL_BROWSER_COMPAT=true" >> $GITHUB_ENV
            echo "BROWSER=all" >> $GITHUB_ENV
          elif [ "$BROWSER_INPUT" != "chromium" ]; then
            echo "FULL_BROWSER_COMPAT=true" >> $GITHUB_ENV
            echo "BROWSER=$BROWSER_INPUT" >> $GITHUB_ENV
          else
            echo "BROWSER=chromium" >> $GITHUB_ENV
          fi
      - name: Install playwright/test
        run: |
          if [ "$FULL_BROWSER_COMPAT" = "true" ] && [ "$BROWSER" = "all" ]; then
            npx playwright install --with-deps chromium firefox webkit
          elif [ "$FULL_BROWSER_COMPAT" = "true" ]; then
            npx playwright install --with-deps "$BROWSER"
          else
            npx playwright install --with-deps chromium
          fi
      - name: Run Playwright tests
        env:
          REPEAT_EACH: ${{ github.event.inputs.repeat_each }}
          TEST_TAG: ${{ github.event.inputs.tag }}
        run: |
          PROJECT_ARG=""
          if [ "$BROWSER" != "all" ] && [ "$BROWSER" != "chromium" ]; then
            PROJECT_ARG="--project=$BROWSER"
          fi
          if [ -n "$REPEAT_EACH" ]; then
            npm run test:playwright -- --grep="$TEST_TAG" --repeat-each="$REPEAT_EACH" $PROJECT_ARG
          else
            npm run test:playwright -- --grep="$TEST_TAG" $PROJECT_ARG
          fi
      - name: GCP Authentication
        id: 'auth'
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ vars.ALLURE_REPORTS_GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/prod-pool/providers/github-provider'
          service_account: 'github-actions-sa@${{ vars.ALLURE_REPORTS_GCP_PROJECT_ID }}.iam.gserviceaccount.com'
      - name: Display GCP bucket information
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          echo "GCP Bucket Name: ${{ vars.ALLURE_REPORTS_GCP_BUCKET }}"
          echo "Destination path: gs://${{ vars.ALLURE_REPORTS_GCP_BUCKET }}/${{ github.run_id }}"
      - uses: actions/upload-artifact@v7
        name: Upload generated Allure report
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore
          retention-days: 1
      - name: Upload Allure report to GCP bucket
        if: hashFiles('allure-report/**') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: google-github-actions/upload-cloud-storage@v3
        with:
          path: allure-report/
          destination: ${{ vars.ALLURE_REPORTS_GCP_BUCKET }}/${{ github.run_id }}
          parent: false
          glob: '**'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results-tagged-tests
          path: test-results/
          if-no-files-found: ignore
          retention-days: 2
