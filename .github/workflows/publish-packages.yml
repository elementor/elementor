# Publish Packages with Build Number
#
# Builds and publishes all packages under packages/ to npm.
#
# Triggers:
#   push to main (packages/** paths) — automatic build, version suffix = run number, dist-tag = "build"
#   workflow_call                    — called by other workflows (e.g. one-click-release); permission check is the caller's responsibility
#   workflow_dispatch                — manual run from the GitHub Actions UI; restricted to permitted users in config.json
#
# Inputs (workflow_call / workflow_dispatch):
#   version        — base semver (e.g. 1.2.3). Omit to read from package.json.
#   version_suffix — pre-release label appended to the version (e.g. beta1 → 1.2.3-beta1).
#                    If omitted, falls back to the tag value (legacy behavior).
#   tag            — npm dist-tag. Special values:
#                      ""  / "manual" → published under dist-tag "manual"
#                      "latest"       → no version suffix, published as latest
#                      <other>        → used as dist-tag; version_suffix (or tag) appended to version
#
# Examples:
#   Publish 1.2.3-beta1 under dist-tag "beta":
#     version=1.2.3  version_suffix=beta1  tag=beta
#
#   Publish 1.2.3 as latest:
#     version=1.2.3  tag=latest
#
#   Manual snapshot from current package.json version:
#     (leave all inputs empty)

name: Publish Packages with Build Number

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ''
        description: 'Base semver version to publish (e.g., 1.2.3). If omitted, reads from package.json.'
      version_suffix:
        type: string
        required: false
        default: ''
        description: 'Pre-release suffix appended to the version (e.g., beta1 → 1.2.3-beta1). If omitted, falls back to the tag value (legacy behavior).'
      tag:
        type: string
        required: false
        default: ''
        description: 'npm dist-tag for the published packages. Empty/"manual" = "manual", "latest" = no version suffix and published as latest, other = custom dist-tag.'
    secrets:
      NPMJS_CLOUD_DEVOPS_TOKEN:
        required: true
      MAINTAIN_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: false
        default: ''
        description: 'Base semver version to publish (e.g., 1.2.3). If omitted, reads from package.json.'
      version_suffix:
        type: string
        required: false
        default: ''
        description: 'Pre-release suffix appended to the version (e.g., beta1 → 1.2.3-beta1). If omitted, falls back to the tag value (legacy behavior).'
      tag:
        type: string
        required: false
        default: ''
        description: 'npm dist-tag for the published packages. Empty/"manual" = "manual", "latest" = no version suffix and published as latest, other = custom dist-tag.'

jobs:
  publish-packages:
    if: startsWith( github.repository, 'elementor/' )
    name: Publish Packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
            node-version: 20.x
            cache: 'npm'
            registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm run install:ci

      - name: Get Configuration
        if: github.event_name == 'workflow_dispatch'
        id: configuration
        uses: rgarcia-phi/json-to-variables@9835d537368468c4e4de5254dc3efeadda183793
        with:
          filename: "./.github/workflows/config.json"
          prefix: config

      - name: Test permissions
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/workflows/permissions
        with:
          ENVIRONMENT: ${{ env.config_deployment_environment }}
          DEPLOYMENT_PERMITTED: ${{ env.config_deployment_permitted }}
          DEPLOYMENT_REPOSITORY_OWNER: ${{ env.config_deployment_repository_owner }}

      - name: Validate Inputs
        run: |
          # Validate version format if provided (semver X.Y.Z, no pre-release suffix here)
          if [ -n "${{ inputs.version }}" ]; then
            if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Error: version must be a base semver version (e.g., 1.2.3). Use version_suffix for pre-release labels."
              exit 1
            fi
          fi

          # Validate version_suffix contains only alphanumeric, dots, and hyphens
          if [ -n "${{ inputs.version_suffix }}" ]; then
            if [[ "${{ inputs.version_suffix }}" =~ [^a-zA-Z0-9.-] ]]; then
              echo "Error: version_suffix contains invalid characters (allowed: alphanumeric, dots, hyphens)"
              exit 1
            fi
          fi

          # Validate tag doesn't contain special characters
          if [ -n "${{ inputs.tag }}" ]; then
            if [[ "${{ inputs.tag }}" =~ [^a-zA-Z0-9._-] ]]; then
              echo "Error: tag contains invalid characters"
              exit 1
            fi
          fi

      - name: Determine Tag Strategy
        id: tag-strategy
        run: |
          # Determine effective tag based on trigger and inputs
          if [ "${{ github.event_name }}" == "push" ]; then
            # Existing behavior: use build number as version suffix
            TAG_SUFFIX="${{ github.run_number }}"
            NPM_DIST_TAG="build"
          elif [ -z "${{ inputs.tag }}" ] || [ "${{ inputs.tag }}" == "manual" ]; then
            # Manual tag
            TAG_SUFFIX="${{ inputs.version_suffix != '' && inputs.version_suffix || 'manual' }}"
            NPM_DIST_TAG="manual"
          elif [ "${{ inputs.tag }}" == "latest" ]; then
            # Latest - no version suffix (version_suffix is ignored for latest)
            TAG_SUFFIX=""
            NPM_DIST_TAG="latest"
          else
            # Custom dist-tag; version_suffix overrides tag for the version string if provided
            TAG_SUFFIX="${{ inputs.version_suffix != '' && inputs.version_suffix || inputs.tag }}"
            NPM_DIST_TAG="${{ inputs.tag }}"
          fi

          echo "TAG_SUFFIX=$TAG_SUFFIX" >> $GITHUB_OUTPUT
          echo "NPM_DIST_TAG=$NPM_DIST_TAG" >> $GITHUB_OUTPUT
          echo "Using version suffix: $TAG_SUFFIX"
          echo "Using npm dist-tag: $NPM_DIST_TAG"
      
      - name: Build Packages
        run: npm run build:packages

      - name: Get/Set Version
        id: version
        run: |
          # Get base version - use input if provided, otherwise read from package.json
          if [ -n "${{ inputs.version }}" ]; then
            BASE_VERSION="${{ inputs.version }}"
            echo "Using provided version: $BASE_VERSION"
          else
            BASE_VERSION=$(node packages/scripts/version-manager/index.js get-version "@elementor/editor")
            echo "Current version from package.json: $BASE_VERSION"
          fi

          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT

          # Only set version if there's a tag suffix
          if [ -n "${{ steps.tag-strategy.outputs.TAG_SUFFIX }}" ]; then
            FULL_VERSION="${BASE_VERSION}-${{ steps.tag-strategy.outputs.TAG_SUFFIX }}"
            echo "Setting version to: $FULL_VERSION"
            node packages/scripts/version-manager/index.js set "$BASE_VERSION" --tag "${{ steps.tag-strategy.outputs.TAG_SUFFIX }}"
          else
            # No tag suffix - versions already defined in package.json or set version without tag
            FULL_VERSION="$BASE_VERSION"
            echo "Using version: $FULL_VERSION"
            # If version was provided as input, we need to set it
            if [ -n "${{ inputs.version }}" ]; then
              node packages/scripts/version-manager/index.js set "$BASE_VERSION"
            fi
          fi

          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_WITH_TAG=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Publish Packages
        run: node packages/scripts/version-manager/index.js publish --tag "${{ steps.tag-strategy.outputs.NPM_DIST_TAG }}" --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_CLOUD_DEVOPS_TOKEN }}

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.MAINTAIN_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.MAINTAIN_TOKEN }}@github.com/${{ github.repository }}.git

          TAG_NAME="v${{ steps.version.outputs.FULL_VERSION }}"

          # Check if tag exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists, skipping creation"
          else
            git tag -a "$TAG_NAME" -m "Release ${{ steps.version.outputs.FULL_VERSION }}"
            git push origin "$TAG_NAME" || echo "Warning: Failed to push tag"
          fi
