name: Post To Slack Created RC Release
description: Post a message to a Slack channel

inputs:
  SLACK_BOT_TOKEN:
    description: 'The Slack token to use'
    required: true
  SLACK_TAG_CHANNELS:
    description: 'The Slack channel to post to'
    required: true
  PAYLOAD:
    description: 'The payload to send to Slack'
    required: true

runs:
  using: "composite"
  steps:
      - name: Prepare Slack payload
        shell: bash
        env:
          PAYLOAD: ${{ inputs.PAYLOAD }}
          SLACK_CHANNEL: ${{ inputs.SLACK_TAG_CHANNELS }}
        run: |
          echo "$PAYLOAD" | jq --arg channel "$SLACK_CHANNEL" '. + {channel: $channel}' > "${{ runner.temp }}/slack-payload.json"
      - name: Post to a Slack channel
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ inputs.SLACK_BOT_TOKEN }}
          payload-file-path: ${{ runner.temp }}/slack-payload.json
