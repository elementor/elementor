name: Close stale pull requests

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  close-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Close pull requests with no updates in 3 months
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          THRESHOLD=$(date -d '3 months ago' +%s)

          gh pr list --repo "${{ github.repository }}" --state open --limit 1000 \
            --json number,title,updatedAt > prs.json

          if [ "$(jq length prs.json)" -eq 0 ]; then
            echo "No open pull requests"
            exit 0
          fi

          COMMENT="$(cat <<'STALE_PR_COMMENT'
          Hi there :wave:

          Thank you for taking the time to put this PR together and contribute to shape the future of Elementor. We really appreciate the effort and thought that went into it! :muscle:

          After a careful review and internal discussion, **we've decided not to move forward with this implementation at this time**. This doesn't take away from the value of your contribution. In many cases like this, it comes down to broader product considerations, priorities, or alignment with our current roadmap.

          That said, we're keeping this on our radar and may revisit the idea as part of a future enhancement.

          **Thanks again for your contribution and for being part of the Elementor community.** :pray:

          Feel free to submit more PRs anytime. We're always happy to review and collaborate! :nerd_face:

          Sincerely,

          **The Elementor Team**
          STALE_PR_COMMENT
          )"

          STALE_COUNT=0

          while read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            UPDATED_AT=$(echo "$pr" | jq -r '.updatedAt')
            UPDATED_TS=$(date --date="$UPDATED_AT" +%s)

            if [ "$UPDATED_TS" -lt "$THRESHOLD" ]; then
              echo "Closing stale PR #${NUMBER}: '${TITLE}' (last updated: ${UPDATED_AT})"
              if ! gh pr close "$NUMBER" --repo "${{ github.repository }}" --comment "$COMMENT"; then
                echo "Failed to close PR #${NUMBER}"
                continue
              fi
              STALE_COUNT=$((STALE_COUNT + 1))
            else
              echo "Skipping PR #${NUMBER} — still within activity window (last updated: ${UPDATED_AT})"
            fi
          done < <(jq -c '.[]' prs.json)

          echo "Closed ${STALE_COUNT} stale pull request(s)"
