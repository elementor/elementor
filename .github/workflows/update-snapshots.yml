name: Update Playwright Snapshots

on:
  workflow_dispatch:
    inputs:
      browser_chromium:
        type: boolean
        description: 'Update Chromium snapshots'
        required: false
        default: true
      browser_firefox:
        type: boolean
        description: 'Update Firefox snapshots'
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  get-php-version:
    name: Calculate PHP Version
    uses: ./.github/workflows/calculate_php_version.yml

  build-plugin:
    name: Build plugin
    uses: ./.github/workflows/build.yml

  update-snapshots:
    name: Update snapshots on PHP (${{ needs.get-php-version.outputs.php_version }})
    runs-on: ubuntu-22.04
    needs: [build-plugin, get-php-version]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PHP_VERSION environment variable
        run: echo "PHP_VERSION=${{ needs.get-php-version.outputs.php_version }}" >> $GITHUB_ENV

      - name: Cache Docker images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-${{ runner.os }}-${{ hashFiles('tests/playwright/.playwright-wp-lite-env.json') }}

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-plugin.outputs.artifact_name }}
          path: ./build

      - name: Download hello-elementor theme
        run: |
          curl -L --output hello-elementor.zip "https://downloads.wordpress.org/theme/hello-elementor.zip"
          unzip hello-elementor

      - name: Update PHP version in config
        run: |
          jq --arg php_version "${{ env.PHP_VERSION }}" '.phpVersion = $php_version' tests/playwright/.playwright-wp-lite-env.json > tmp.json && mv tmp.json tests/playwright/.playwright-wp-lite-env.json

      - name: Install WordPress environment
        run: npm run start-local-server

      - name: Setup test data
        run: npm run test:setup:playwright

      - name: Resolve browsers to install
        id: browsers
        run: |
          BROWSERS=""
          if [[ "${{ inputs.browser_chromium }}" == "true" ]]; then
            BROWSERS="chromium"
          fi
          if [[ "${{ inputs.browser_firefox }}" == "true" ]]; then
            BROWSERS="$BROWSERS firefox"
          fi
          BROWSERS=$(echo "$BROWSERS" | xargs)
          if [[ -z "$BROWSERS" ]]; then
            BROWSERS="chromium"
          fi
          echo "list=$BROWSERS" >> $GITHUB_OUTPUT
          echo "Updating snapshots for browsers: $BROWSERS"

      - name: Install playwright/test
        run: npx playwright install --with-deps ${{ steps.browsers.outputs.list }}

      - name: Update snapshots
        continue-on-error: true
        env:
          BROWSERS: ${{ steps.browsers.outputs.list }}
        run: npm run test:playwright -- --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find tests -type d -name '*-snapshots' -exec git add {} + || true
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "test: update playwright snapshots [${{ steps.browsers.outputs.list }}]"
            git push origin HEAD:${{ github.ref_name }}
          fi
