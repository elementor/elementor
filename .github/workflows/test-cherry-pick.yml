name: Test Cherry Pick Workflow

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test cherry-pick'
        required: true
        type: string
      target_branches:
        description: 'Target branches (comma-separated, e.g., "3.30,dev")'
        required: true
        type: string
      dry_run:
        description: 'Dry run mode (just log what would happen)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test-cherry-pick:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Get PR information
        id: pr_info
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number }}"
          echo "Getting PR #${PR_NUMBER} information..."
          
          # Get PR details using GitHub API
          PR_DATA=$(gh pr view ${PR_NUMBER} --json number,title,url,mergeCommit,merged,headRepository,labels)
          
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_URL=$(echo "$PR_DATA" | jq -r '.url')
          MERGE_SHA=$(echo "$PR_DATA" | jq -r '.mergeCommit.oid // empty')
          IS_MERGED=$(echo "$PR_DATA" | jq -r '.merged')
          HEAD_REPO=$(echo "$PR_DATA" | jq -r '.headRepository.nameWithOwner')
          
          # Check if it's a fork PR
          IS_FORK="false"
          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            IS_FORK="true"
          fi
          
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "is_merged=${IS_MERGED}" >> "$GITHUB_OUTPUT"
          echo "head_repo=${HEAD_REPO}" >> "$GITHUB_OUTPUT"
          echo "is_fork=${IS_FORK}" >> "$GITHUB_OUTPUT"
          
          echo "=== PR Information ==="
          echo "PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "Merged: ${IS_MERGED}"
          echo "Source: ${HEAD_REPO}"
          echo "Is Fork: ${IS_FORK}"
          echo "Merge SHA: ${MERGE_SHA}"
          echo "URL: ${PR_URL}"
        shell: bash

      - name: Validate PR state
        run: |
          if [ "${{ steps.pr_info.outputs.is_merged }}" != "true" ]; then
            echo "::error::PR #${{ steps.pr_info.outputs.pr_number }} is not merged yet"
            echo "::notice::This workflow only works with already-merged PRs"
            exit 1
          fi
          
          if [ -z "${{ steps.pr_info.outputs.merge_sha }}" ]; then
            echo "::error::Could not find merge commit for PR #${{ steps.pr_info.outputs.pr_number }}"
            exit 1
          fi
          
          echo "✅ PR validation passed"
        shell: bash

      - name: Parse and validate target branches
        id: branches
        run: |
          BRANCHES="${{ github.event.inputs.target_branches }}"
          echo "Target branches input: $BRANCHES"
          
          # Fetch all branches to check existence
          git fetch --all
          
          # Validate each branch exists
          IFS=',' read -ra BRANCH_ARRAY <<< "$BRANCHES"
          VALID_BRANCHES=""
          
          for branch in "${BRANCH_ARRAY[@]}"; do
            branch=$(echo "$branch" | xargs) # trim whitespace
            if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              echo "✅ Branch '$branch' exists"
              if [ -z "$VALID_BRANCHES" ]; then
                VALID_BRANCHES="$branch"
              else
                VALID_BRANCHES="$VALID_BRANCHES,$branch"
              fi
            else
              echo "❌ Branch '$branch' does not exist"
            fi
          done
          
          if [ -z "$VALID_BRANCHES" ]; then
            echo "::error::No valid target branches found"
            exit 1
          fi
          
          echo "branches_csv=$VALID_BRANCHES" >> "$GITHUB_OUTPUT"
          echo "Valid target branches: $VALID_BRANCHES"
        shell: bash

      - name: Test Cherry-Pick Process
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          MERGE_SHA="${{ steps.pr_info.outputs.merge_sha }}"
          ORIG_TITLE="${{ steps.pr_info.outputs.pr_title }}"
          ORIG_URL="${{ steps.pr_info.outputs.pr_url }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          IS_FORK="${{ steps.pr_info.outputs.is_fork }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "=== Cherry-pick Test Results ==="
          echo "PR: #${PR_NUMBER}"
          echo "Title: ${ORIG_TITLE}"
          echo "Fork PR: ${IS_FORK}"
          echo "Dry run: ${DRY_RUN}"
          echo "Merge SHA: ${MERGE_SHA}"
          echo ""

          SUCCESS_COUNT=0
          CONFLICT_COUNT=0
          ERROR_COUNT=0

          IFS=',' read -ra BRANCHES <<< "${{ steps.branches.outputs.branches_csv }}"
          for TARGET in "${BRANCHES[@]}"; do
            TARGET=$(echo "$TARGET" | xargs) # trim whitespace
            BRANCH="cherry-pick-pr-${PR_NUMBER}-${TARGET}"

            echo "--- Testing: ${TARGET} ---"

            # Create branch
            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 [DRY-RUN] Would create branch: $BRANCH from origin/$TARGET"
              
              # Test cherry-pick compatibility without creating permanent changes
              TEMP_BRANCH="${BRANCH}-temp-test"
              if git checkout -b "$TEMP_BRANCH" "origin/$TARGET" 2>/dev/null; then
                if git cherry-pick --no-commit -m 1 "$MERGE_SHA" 2>/dev/null; then
                  echo "✅ [DRY-RUN] Cherry-pick would succeed cleanly"
                  echo "🔍 [DRY-RUN] Would create PR: $BRANCH → $TARGET"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  git reset --hard HEAD 2>/dev/null || true
                else
                  echo "⚠️  [DRY-RUN] Cherry-pick would have conflicts"
                  echo "🔍 [DRY-RUN] Would create conflict resolution PR"
                  CONFLICT_COUNT=$((CONFLICT_COUNT + 1))
                fi
                git cherry-pick --abort 2>/dev/null || true
                git checkout - 2>/dev/null || true
                git branch -D "$TEMP_BRANCH" 2>/dev/null || true
              else
                echo "❌ [DRY-RUN] Failed to create test branch"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            else
              echo "🚀 Creating branch: $BRANCH"
              if git checkout -b "$BRANCH" "origin/$TARGET"; then
                if git cherry-pick -m 1 "$MERGE_SHA"; then
                  echo "✅ Cherry-pick successful!"
                  echo "📋 Branch created: $BRANCH"
                  echo "💡 To push: git push -u origin $BRANCH"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                else
                  echo "⚠️  Cherry-pick has conflicts"
                  echo "🔧 Manual resolution would be needed"
                  CONFLICT_COUNT=$((CONFLICT_COUNT + 1))
                  git cherry-pick --abort
                fi
                
                # Cleanup test branch
                git checkout - 2>/dev/null || true
                git branch -D "$BRANCH" 2>/dev/null || true
              else
                echo "❌ Failed to create branch"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            fi

            echo ""
          done

          echo "=== Summary ==="
          echo "✅ Successful: $SUCCESS_COUNT"
          echo "⚠️  Conflicts: $CONFLICT_COUNT"  
          echo "❌ Errors: $ERROR_COUNT"
          echo ""
          
          if [ "$DRY_RUN" = "true" ]; then
            echo "🎯 This was a dry-run test. No actual branches or PRs were created."
            echo "💡 Set 'Dry run' to false to perform actual cherry-picks (use with caution!)"
          fi
          
          echo "=== Test completed ==="
        shell: bash 