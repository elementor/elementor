name: Lighthouse

on:
  workflow_run:
    workflows: ["PR"]
    types: [completed]
  push:
    branches:
      - 'main'
      - '[0-9].[0-9][0-9]'
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'bin/**'
      - '.gitignore'
      - 'docs/**'
  merge_group:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  resolve-pr-context:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      build_run_id: ${{ steps.resolve.outputs.build_run_id }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
    steps:
      - name: Resolve PR workflow context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            if (run.conclusion !== 'success' || run.event !== 'pull_request') {
              core.setOutput('should_run', 'false');
              return;
            }

            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.setOutput('should_run', 'false');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prs[0].number,
            });

            const hasRunTestsLabel = pr.labels.some((label) => label.name === 'run-tests');
            if (!hasRunTestsLabel) {
              core.setOutput('should_run', 'false');
              return;
            }

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });

            const pluginArtifact = artifacts.find((artifact) => artifact.name.startsWith('elementor-'));
            if (!pluginArtifact) {
              core.setFailed('No elementor artifact found in PR workflow run');
              return;
            }

            core.setOutput('should_run', 'true');
            core.setOutput('build_run_id', String(run.id));
            core.setOutput('artifact_name', pluginArtifact.name);

  build-plugin-lh:
    if: github.event_name == 'push' || github.event_name == 'merge_group'
    name: Lighthouse build artifact
    uses: ./.github/workflows/build.yml
    with:
      job_name: Lighthouse build artifact

  lighthouse_test:
    name: Lighthouse test - WP latest on PHP 7.4
    runs-on: ubuntu-latest
    needs: [resolve-pr-context, build-plugin-lh]
    if: |
      always() && (
        (github.event_name == 'workflow_run' && needs.resolve-pr-context.result == 'success' && needs.resolve-pr-context.outputs.should_run == 'true') ||
        ((github.event_name == 'push' || github.event_name == 'merge_group') && needs.build-plugin-lh.result == 'success')
      )
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Remove package.json
        run: rm -f package*.json

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Download build artifact from PR workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve-pr-context.outputs.build_run_id }}
          name: ${{ needs.resolve-pr-context.outputs.artifact_name }}
          path: ./elementor

      - name: Download build artifact from Lighthouse build
        if: github.event_name != 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-plugin-lh.outputs.artifact_name }}
          path: ./elementor

      - name: Setup wp-env
        uses: elementor/elementor-editor-github-actions/actions/setup-wp-env@master
        with:
          php: '7.4'
          active-theme: 'hello-elementor'
          plugins: |-
            ./elementor
          themes: |-
            https://downloads.wordpress.org/theme/hello-elementor.zip
          mappings: |-
            elementor-templates:./tests/playwright/templates

      - name: Import Templates
        uses: elementor/elementor-editor-github-actions/actions/setup-elementor-env@master
        with:
          env: 'testing'
          templates: |-
            elementor-templates

      - name: Install lhci
        run: npm install --no-package-lock --no-save @lhci/cli@0.14.0

      - name: Run Lighthouse tests
        run: |
          bash "${GITHUB_WORKSPACE}/.github/scripts/run-lighthouse-tests.sh"

      - name: Save HTML dumps on failure
        if: failure()
        run: |
          bash "${GITHUB_WORKSPACE}/.github/scripts/save-lighthouse-pages-html-dumps.sh"

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouseci-reports
          path: ${{ github.workspace }}/.lighthouseci/reports/**/*
          retention-days: 7

      - name: Upload Lighthouse HTML dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouseci-htmls
          path: ${{ github.workspace }}/.lighthouseci/dumps/**/*
          retention-days: 7

  lighthouse:
    needs: lighthouse_test
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    name: Lighthouse - Test Results
    steps:
      - name: Test status
        run: echo "Test status is - ${{ needs.lighthouse_test.result }}"

      - name: Check lighthouse_test matrix status
        if: ${{ needs.lighthouse_test.result != 'success' && needs.lighthouse_test.result != 'skipped' }}
        run: exit 1
