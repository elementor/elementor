name: Release Doc Generator

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-doc-${{ github.repository }}
  cancel-in-progress: false  # queue runs, never skip — last write wins

jobs:
  update-release-doc:
    if: github.event.pull_request.merged == true && startsWith(github.repository, 'elementor/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update release doc
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_PARENT_PAGE_ID: "471075795"
          CONFLUENCE_SPACE_KEY: "RDDEP"
        run: python .github/scripts/update-release-doc.py
